name: Build Linux Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 也支持手动触发

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pyinstaller pandas trino PyPDF2 python-docx

      - name: 用 PyInstaller 打包
        run: |
          pyinstaller --onefile \
            --name bidding_etl \
            --hidden-import trino \
            --hidden-import trino.auth \
            --hidden-import trino.dbapi \
            --hidden-import pandas \
            --hidden-import PyPDF2 \
            --hidden-import docx \
            --hidden-import pkg_resources.py2_warn \
            --collect-all trino \
            --collect-all pandas \
            bidding_etl.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: bidding_etl-linux
          path: dist/bidding_etl
